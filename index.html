<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BANDERAS</title>
    <link href="style.css" rel="stylesheet" />
    <script type="module" src="./scripts/ejerciciobanderas.js"></script>
  </head>

 <body class="dark:bg-gray-900 dark:text-white transition-colors duration-300">
  <nav class="h-25 flex items-center justify-between px-5 shadow md:px-15 dark:bg-gray-800">
    <p class="font-bold">Where in the world?</p>
    <button id="darkmode" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300 dark:bg-gray-700 dark:text-white dark:hover:bg-gray-600 transition-colors">
      🌙 Dark Mode
    </button>
  </nav>

  <main class="bg-gray-100 dark:bg-gray-900 pt-5 px-5 min-h-screen transition-colors duration-300">
    <section class="flex flex-col md:flex-row gap-4 mb-5 justify-between md:px-15 md:py-7">
      <input class="bg-white px-7 py-5 shadow md:w-100 dark:bg-gray-800 dark:text-white dark:placeholder-gray-400 transition-colors" type="text" placeholder="🔍  Search for a country...">
      
      <select id="filtro-region" class="bg-white w-62.5 px-8 py-4 shadow dark:bg-gray-800 dark:text-white transition-colors" name="" id="">
       <option value="todas">Todas</option>
      <option value="Africa">Africa</option>
      <option value="Americas">America</option>
      <option value="Asia">Asia</option>
      <option value="Europe">Europe</option>
      <option value="Oceania">Oceania</option>
      <option value="polar">Polar</option>
      </select>
    </section>
  
    <section id="contenedor-banderas" class="flex flex-col md:flex-row md:flex-wrap items-center gap-15">
      </section>

  </main>
</body>
</html>
